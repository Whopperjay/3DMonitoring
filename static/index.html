<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bambu Lab P1S Monitor</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto:wght@300;400;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>
    <div class="container">
        <header>
            <h1>Bambu Lab P1S <span class="status-indicator" id="status-indicator">OFFLINE</span></h1>
            <div class="connection-info">
                <span>IP: <span id="printer-ip">---</span></span>
            </div>
        </header>

        <main>
            <!-- Live Status Section -->
            <section class="live-status">
                <div class="card current-job">
                    <h2>Current Job</h2>
                    <div class="job-details">
                        <div class="detail-item">
                            <span class="label">File</span>
                            <span class="value" id="file-name">---</span>
                        </div>
                        <div class="detail-item">
                            <span class="label">Time Remaining</span>
                            <span class="value" id="time-remaining">--:--</span>
                        </div>
                        <div class="detail-item">
                            <span class="label">Layers</span>
                            <span class="value" id="layer-info">-- / --</span>
                        </div>
                        <div class="detail-grid-row">
                            <div class="status-box">
                                <span class="label">Speed</span>
                                <span class="value" id="speed-profile">Standard</span>
                            </div>
                            <div class="status-box">
                                <span class="label">Light</span>
                                <span class="value" id="light-status">OFF</span>
                                <div class="auto-light-toggle">
                                    <label class="switch">
                                        <input type="checkbox" id="auto-light-check">
                                        <span class="slider"></span>
                                    </label>
                                    <span class="toggle-label">Auto Off (20m)</span>
                                    <span class="auto-light-timer" id="auto-light-timer" style="display: none;"></span>
                                </div>
                            </div>
                        </div>
                        <div class="progress-container">
                            <div class="progress-bar" id="progress-bar" style="width: 0%;"></div>
                            <span class="progress-text" id="progress-text">0%</span>
                        </div>
                        <div class="circular-progress-wrapper">
                            <svg class="circular-progress" width="120" height="120" viewBox="0 0 120 120">
                                <defs>
                                    <linearGradient id="progressGradient" x1="0%" y1="0%" x2="100%" y2="0%">
                                        <stop offset="0%" style="stop-color: #00ffcc; stop-opacity: 1" />
                                        <stop offset="100%" style="stop-color: #ff0055; stop-opacity: 1" />
                                    </linearGradient>
                                </defs>
                                <circle class="progress-bg" cx="60" cy="60" r="52" />
                                <circle class="progress-circle" id="progress-circle" cx="60" cy="60" r="52" />
                                <text class="progress-percentage" id="circular-progress-text" x="60" y="60" text-anchor="middle" dominant-baseline="middle">0%</text>
                            </svg>
                        </div>
                    </div>
                </div>

                <div class="card ams-status">
                    <h2>AMS</h2>
                    <div id="ams-container" class="ams-grid">
                        <!-- AMS slots populated by JS -->
                    </div>
                </div>

                <div class="card temperatures">
                    <h2>Temperatures</h2>
                    <div class="temp-gauge">
                        <div class="gauge-item">
                            <svg class="icon icon-nozzle" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <!-- Nozzle body (conical shape) -->
                                <path d="M8 2H16V6L14 8V12L12 14L10 12V8L8 6V2Z" fill="currentColor" opacity="0.8"/>
                                <!-- Heating block -->
                                <rect x="9" y="12" width="6" height="4" rx="1" fill="currentColor"/>
                                <!-- Nozzle tip -->
                                <path d="M10.5 16L12 20L13.5 16Z" fill="currentColor"/>
                                <!-- Heat waves -->
                                <path d="M6 18C6 18 7 17 7 16C7 15 6 14 6 14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
                                <path d="M18 18C18 18 17 17 17 16C17 15 18 14 18 14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
                                <path d="M4 20C4 20 5 19 5 18C5 17 4 16 4 16" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
                                <path d="M20 20C20 20 19 19 19 18C19 17 20 16 20 16" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
                            </svg>
                            <span class="label">Nozzle</span>
                            <span class="value" id="temp-nozzle">0°C</span>
                        </div>
                        <div class="gauge-item">
                            <svg class="icon icon-bed" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <!-- Platform/Bed surface -->
                                <rect x="3" y="11" width="18" height="3" rx="0.5" fill="currentColor" opacity="0.9"/>
                                <!-- Heating element grid pattern -->
                                <path d="M5 12.5 H19 M8 11.5 V13.5 M12 11.5 V13.5 M16 11.5 V13.5" stroke="currentColor" stroke-width="0.8" opacity="0.4"/>
                                <!-- Heat waves underneath -->
                                <path d="M6 16 Q7 15 8 16 T10 16" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
                                <path d="M10 16 Q11 15 12 16 T14 16" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
                                <path d="M14 16 Q15 15 16 16 T18 16" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
                                <!-- Heat waves second row -->
                                <path d="M7 19 Q8 18 9 19 T11 19" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" opacity="0.4"/>
                                <path d="M11 19 Q12 18 13 19 T15 19" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" opacity="0.4"/>
                                <path d="M15 19 Q16 18 17 19 T19 19" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" opacity="0.4"/>
                                <!-- Support posts -->
                                <rect x="4" y="14" width="1.5" height="4" fill="currentColor" opacity="0.5"/>
                                <rect x="18.5" y="14" width="1.5" height="4" fill="currentColor" opacity="0.5"/>
                                <!-- Top indicator lights -->
                                <circle cx="7" cy="8" r="1" fill="currentColor" opacity="0.3"/>
                                <circle cx="12" cy="8" r="1" fill="currentColor" opacity="0.3"/>
                                <circle cx="17" cy="8" r="1" fill="currentColor" opacity="0.3"/>
                            </svg>
                            <span class="label">Bed</span>
                            <span class="value" id="temp-bed">0°C</span>
                        </div>
                    </div>
                </div>

                <div class="card fans">
                    <h2>Fans</h2>
                    <div class="fan-grid">
                        <div class="fan-item" data-fan="part">
                            <svg class="fan-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <circle cx="12" cy="12" r="2" fill="currentColor"/>
                                <path d="M12 2C12 2 10 6 10 8C10 10 11 11 12 11C13 11 14 10 14 8C14 6 12 2 12 2Z" fill="currentColor" opacity="0.7"/>
                                <path d="M22 12C22 12 18 14 16 14C14 14 13 13 13 12C13 11 14 10 16 10C18 10 22 12 22 12Z" fill="currentColor" opacity="0.7"/>
                                <path d="M12 22C12 22 14 18 14 16C14 14 13 13 12 13C11 13 10 14 10 16C10 18 12 22 12 22Z" fill="currentColor" opacity="0.7"/>
                                <path d="M2 12C2 12 6 10 8 10C10 10 11 11 11 12C11 13 10 14 8 14C6 14 2 12 2 12Z" fill="currentColor" opacity="0.7"/>
                            </svg>
                            <span class="label">Part</span>
                            <span class="value" id="fan-part">0%</span>
                        </div>
                        <div class="fan-item" data-fan="aux">
                            <svg class="fan-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <circle cx="12" cy="12" r="2" fill="currentColor"/>
                                <path d="M12 2C12 2 10 6 10 8C10 10 11 11 12 11C13 11 14 10 14 8C14 6 12 2 12 2Z" fill="currentColor" opacity="0.7"/>
                                <path d="M22 12C22 12 18 14 16 14C14 14 13 13 13 12C13 11 14 10 16 10C18 10 22 12 22 12Z" fill="currentColor" opacity="0.7"/>
                                <path d="M12 22C12 22 14 18 14 16C14 14 13 13 12 13C11 13 10 14 10 16C10 18 12 22 12 22Z" fill="currentColor" opacity="0.7"/>
                                <path d="M2 12C2 12 6 10 8 10C10 10 11 11 11 12C11 13 10 14 8 14C6 14 2 12 2 12Z" fill="currentColor" opacity="0.7"/>
                            </svg>
                            <span class="label">Aux</span>
                            <span class="value" id="fan-aux">0%</span>
                        </div>
                        <div class="fan-item" data-fan="chamber">
                            <svg class="fan-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <circle cx="12" cy="12" r="2" fill="currentColor"/>
                                <path d="M12 2C12 2 10 6 10 8C10 10 11 11 12 11C13 11 14 10 14 8C14 6 12 2 12 2Z" fill="currentColor" opacity="0.7"/>
                                <path d="M22 12C22 12 18 14 16 14C14 14 13 13 13 12C13 11 14 10 16 10C18 10 22 12 22 12Z" fill="currentColor" opacity="0.7"/>
                                <path d="M12 22C12 22 14 18 14 16C14 14 13 13 12 13C11 13 10 14 10 16C10 18 12 22 12 22Z" fill="currentColor" opacity="0.7"/>
                                <path d="M2 12C2 12 6 10 8 10C10 10 11 11 11 12C11 13 10 14 8 14C6 14 2 12 2 12Z" fill="currentColor" opacity="0.7"/>
                            </svg>
                            <span class="label">Chamber</span>
                            <span class="value" id="fan-chamber">0%</span>
                        </div>
                    </div>
                </div>
            </section>

            <!-- History Section -->
            <section class="history">
                <div class="history-header">
                    <h2>Print History</h2>
                    <span class="total-duration" id="total-duration"></span>
                </div>
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>Date</th>
                                <th>Filename</th>
                                <th>Duration</th>
                                <th>Status</th>
                                <th>Filament (g)</th>
                            </tr>
                        </thead>
                        <tbody id="history-body">
                            <!-- Rows will be populated by JS -->
                        </tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>

    <!-- Toast Notifications Container -->
    <div id="toast-container" class="toast-container"></div>

    <script src="/static/app.js"></script>
</body>

</html>
